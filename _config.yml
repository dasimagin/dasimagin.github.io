# Setup
title: The Lab
tagline: We make robots
url: https://dasimagin.github.io
paginate: 5
paginate_path: "/blog/page:num/"
baseurl: ""
permalink: pretty

# Gems
plugins:
  - jekyll-gist
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-sitemap

# Optimize Jekyll
exclude:
  - .gitignore
  - .git
  - .jekyll-cache
  - Gemfile
  - Gemfile.lock
  - README.md

markdown: kramdown

# kramdown:
  # parse_block_html: true

sass:
  sass_dir: _sass
  style: :compressed

# Options
author:
  name: Simagin Denis
  url: https://github.com/dasimagin
  email: markdotto@gmail.com

